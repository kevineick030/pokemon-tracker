# nginx-Konfiguration für das Pokémon-Tracker-Dashboard
# Ablage: /etc/nginx/sites-available/pokemon-dashboard
# Aktivieren: ln -s /etc/nginx/sites-available/pokemon-dashboard /etc/nginx/sites-enabled/
#            nginx -t && systemctl reload nginx
#
# Dashboard läuft lokal auf 127.0.0.1:5000 (gunicorn), nginx terminiert TLS.

# ---- HTTP: auf HTTPS umleiten (ACME-Challenge für certbot durchlassen) ----
server {
    listen 80;
    listen [::]:80;
    server_name deine-domain.de;   # <-- anpassen

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name deine-domain.de;   # <-- anpassen

    # --- SSL (certbot füllt diese Zeilen nach `certbot --nginx`) ---
    # ssl_certificate     /etc/letsencrypt/live/deine-domain.de/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/deine-domain.de/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Sicherheits-Header (Flask setzt zusätzlich eigene)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10M;

    # Dashboard unter /dashboard erreichbar
    location /dashboard/ {
        proxy_pass http://127.0.0.1:5000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /dashboard;
        proxy_redirect off;
    }

    # Optional: Root ebenfalls auf das Dashboard zeigen
    location = / {
        return 302 /dashboard/;
    }
}
