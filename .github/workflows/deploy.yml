name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 87.106.255.195
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/pokemon-tracker
            git pull origin main
            systemctl restart pokemon-tracker
            echo "✅ Deploy erfolgreich: $(date)"
